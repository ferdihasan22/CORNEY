<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#b50303" />
    <!-- PWA standalone (Add to Home Screen) → status bar mengikuti warna app.
         status-bar-style 'default' = aman (header tak ketiban notch; app belum
         menangani safe-area). Untuk fullscreen penuh edge-to-edge perlu pass safe-area. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CORNEY" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>CORNEY · #CeritanyaBersamaCorney</title>

    <!-- Fonts (Plus Jakarta Sans + Material Symbols) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
