<script>
        // Micro-interaction for filter chips
        document.querySelectorAll('button.rounded-full').forEach(btn => {
            btn.addEventListener('click', function() {
                if(this.innerText !== 'Semua' && this.innerText !== 'Sweet' && this.innerText !== 'Savory' && this.innerText !== 'Best Seller') return;
                
                document.querySelectorAll('button.rounded-full').forEach(b => {
                    b.classList.remove('bg-secondary-container', 'text-on-secondary-container');
                    b.classList.add('border', 'border-outline-variant', 'text-on-surface-variant');
                });
                this.classList.add('bg-secondary-container', 'text-on-secondary-container');
                this.classList.remove('border', 'border-outline-variant', 'text-on-surface-variant');
            });
        });

        // Add to cart simple simulation
        document.querySelectorAll('button').forEach(btn => {
            if(btn.innerText.includes('Tambah')) {
                btn.addEventListener('click', (e) => {
                    const ripple = document.createElement('div');
                    ripple.className = 'absolute inset-0 bg-white/20 rounded-[14px] animate-ping';
                    btn.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 400);
                });
            }
        });
    </script>
