                        "inverse-primary": "#ffb4a8",

<body class="bg-surface overflow-hidden">
<!-- Mock Background: The Walk-in Sale Screen -->
<div class="fixed inset-0 w-full h-full pointer-events-none brightness-50 contrast-75">
<img class="w-full h-full object-cover" data-alt="A high-end fast food POS dashboard on a 10-inch tablet. The screen features a clean grid of appetizing corndog photography with vibrant red and yellow branding. It includes a side navigation bar and a header with the CORNEY logo. The entire interface is slightly dimmed and blurred as if in the background of a focused modal." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDHWEj3XMie1x-HB6oZlAzwdqFT4-SZ3t-3y5Jh3DwbmrQAQB-_iD1v-bumXIk1PvmVyGPYoa3EvCE2n9DEhklx7oYC7137pcMFd1INVH_8sgsYYwda1RY5stB4nxos2fPo-993cOUj3aw9KszIH9VUioeivfmNelNzvcuH-7M4dlYqqjiIjNlo6Z-nUUgAl-CjOyxQHD8wpks2bJ8qdhzRY-RmSuIZy80YFsQ36DsuizL3GX8BPDyd6JhQI2CrnzOYS-9H6FvTKbY"/>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-on-background/40 backdrop-blur-sm">
<!-- Modal Container -->
<div class="bg-surface-container-lowest w-full max-w-[460px] rounded-[16px] shadow-2xl flex flex-col overflow-hidden animate-in fade-in zoom-in duration-200">
<!-- Header -->
<div class="flex items-center justify-between px-6 py-5">
<h1 class="font-headline-md text-headline-md text-on-surface">Mozza Ori</h1>
<button class="w-min-tap-target h-min-tap-target flex items-center justify-center rounded-full hover:bg-surface-container transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
</div>
<!-- Subtext -->
<div class="px-6 pb-4">
<p class="font-body-md text-body-md text-on-surface-variant">Pilih saus. Gratis maks 2, selebihnya berbayar.</p>
</div>
<!-- Sauce List -->
<div class="flex-1 px-6 space-y-2 overflow-y-auto max-h-[400px] custom-scrollbar">
<!-- Row 1 -->
<label class="flex items-center justify-between min-h-min-tap-target p-4 rounded-xl border border-outline-variant bg-surface-container-low cursor-pointer hover:bg-surface-container transition-colors">
<div class="flex items-center gap-3">
<div class="relative flex items-center">
<input checked="" class="w-6 h-6 rounded text-primary focus:ring-primary border-outline transition-all cursor-pointer" type="checkbox"/>
</div>
<div class="flex flex-col">
<span class="font-label-lg text-label-lg text-on-surface">Saus Tomat</span>
<span class="inline-flex items-center px-2 py-0.5 mt-1 rounded-full text-[10px] font-bold uppercase tracking-wider bg-secondary-container text-on-secondary-container w-fit">Gratis</span>
</div>
</div>
</label>
<!-- Row 2 -->
<label class="flex items-center justify-between min-h-min-tap-target p-4 rounded-xl border border-outline-variant hover:bg-surface-container transition-colors cursor-pointer">
<div class="flex items-center gap-3">
<div class="relative flex items-center">
<input class="w-6 h-6 rounded text-primary focus:ring-primary border-outline transition-all cursor-pointer" type="checkbox"/>
</div>
<div class="flex flex-col">
<span class="font-label-lg text-label-lg text-on-surface">Saus Keju</span>
<span class="inline-flex items-center px-2 py-0.5 mt-1 rounded-full text-[10px] font-bold uppercase tracking-wider bg-secondary-container text-on-secondary-container w-fit">Gratis</span>
</div>
</div>
</label>
<!-- Row 3 -->
<label class="flex items-center justify-between min-h-min-tap-target p-4 rounded-xl border border-outline-variant bg-surface-container-low cursor-pointer hover:bg-surface-container transition-colors">
<div class="flex items-center gap-3">
<div class="relative flex items-center">
<input checked="" class="w-6 h-6 rounded text-primary focus:ring-primary border-outline transition-all cursor-pointer" type="checkbox"/>
</div>
<div class="flex flex-col">
<span class="font-label-lg text-label-lg text-on-surface">Saus Sambal</span>
<span class="font-label-md text-label-md text-primary mt-1">+Rp 2.000</span>
</div>
</div>
</label>
<!-- Row 4 -->
<label class="flex items-center justify-between min-h-min-tap-target p-4 rounded-xl border border-outline-variant hover:bg-surface-container transition-colors cursor-pointer">
<div class="flex items-center gap-3">
<div class="relative flex items-center">
<input class="w-6 h-6 rounded text-primary focus:ring-primary border-outline transition-all cursor-pointer" type="checkbox"/>
</div>
<div class="flex flex-col">
<span class="font-label-lg text-label-lg text-on-surface">Mayonaise</span>
<span class="font-label-md text-label-md text-primary mt-1">+Rp 2.000</span>
</div>
</div>
</label>
</div>
<!-- Status Text -->
<div class="px-6 pt-4 pb-6">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary text-lg">info</span>
<p class="font-label-md text-label-md text-secondary">Saus gratis: 1/2</p>
</div>
</div>
<div class="px-6">
<hr class="border-outline-variant"/>
</div>
<!-- Price Recap -->
<div class="px-6 py-6">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Harga corndog Rp 17.000 + saus Rp 2.000 = <span class="font-bold text-on-surface text-lg">Rp 19.000</span>
</p>
</div>
<!-- Buttons -->
<div class="px-6 pb-8 flex flex-col gap-3">
<button class="h-min-tap-target w-full bg-primary-container text-on-primary rounded-[14px] font-label-lg text-label-lg shadow-lg hover:brightness-110 active:scale-[0.98] transition-all duration-100 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">add_shopping_cart</span>
                    Tambah ke Keranjang
                </button>
<button class="h-min-tap-target w-full bg-transparent text-tertiary font-label-lg text-label-lg hover:bg-surface-container transition-colors rounded-[14px]">
                    Batal
                </button>
</div>
</div>
</div>
<script>
        // Simple logic to simulate the "squishy" tactile feel and limit selection if needed
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.style.transform = 'scale(0.96)';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.transform = 'scale(1)';
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = 'scale(1)';
            });
        });

        // Toggle background highlight for selected sauce rows
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        checkboxes.forEach(cb => {
            cb.addEventListener('change', (e) => {
                const row = e.target.closest('label');
                if (e.target.checked) {
                    row.classList.add('bg-surface-container-low');
                } else {
                    row.classList.remove('bg-surface-container-low');
                }
            });
        });
    </script>
</body></html>
