<script>
        // Simple Interaction: Toggle quantity
        const minusBtn = document.querySelector('button .material-symbols-outlined[innerText="remove"]')?.parentElement;
        const plusBtn = document.querySelector('button .material-symbols-outlined[innerText="add"]')?.parentElement;
        const countDisplay = document.querySelector('.w-8.text-center');
        const priceDisplay = document.querySelector('.flex-1 .text-label-lg');
        let count = 1;
        const basePrice = 17000;

        // Note: The above selectors are a bit fragile due to innerText logic in a template, 
        // using index based for stability in this demo environment.
        const btns = document.querySelectorAll('.bg-surface-container button');
        const countSpan = document.querySelector('.bg-surface-container span');
        const footerTotal = document.querySelector('.flex-1 span.text-label-lg');

        if(btns.length >= 2) {
            btns[0].onclick = () => {
                if(count > 1) {
                    count--;
                    updateUI();
                }
            };
            btns[1].onclick = () => {
                count++;
                updateUI();
            };
        }

        function updateUI() {
            countSpan.textContent = count;
            footerTotal.textContent = `Rp ${(count * basePrice).toLocaleString('id-ID')}.000`;
        }

        // Sauce checkbox logic - simplistic visual update
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        checkboxes.forEach(cb => {
            cb.onchange = (e) => {
                const parent = e.target.closest('label');
                if(e.target.checked) {
                    parent.classList.add('ring-2', 'ring-primary', 'bg-primary-container/5');
                } else {
                    parent.classList.remove('ring-2', 'ring-primary', 'bg-primary-container/5');
                }
            }
        });
    </script>
