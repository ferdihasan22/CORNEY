<style>
        body {
            background-color: #FFFFFF;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-card-shadow {
            box-shadow: 0px 4px 16px rgba(26, 26, 26, 0.08);
        }
        .primary-button-shadow {
            box-shadow: 0px 8px 24px rgba(181, 3, 3, 0.2);
        }
        .primary-button-active {
            transform: scale(0.98);
            box-shadow: 0px 4px 12px rgba(181, 3, 3, 0.15);
        }

<body class="flex flex-col items-center justify-center min-h-screen p-margin-page select-none">
<!-- Header Section -->
<header class="flex flex-col items-center mb-10 animate-in fade-in duration-700">
<div class="relative mb-2">
<h1 class="font-display-md text-display-md text-primary-container tracking-tighter">
                CORNEY
            </h1>
<div class="h-1.5 w-1/3 bg-secondary-container absolute -bottom-1 left-0 rounded-full"></div>
</div>
<p class="font-label-md text-label-md text-tertiary-container tracking-wide">
            #CeritanyaBersamaCorney
        </p>
</header>
<!-- Login Container -->
<main class="w-full max-w-[420px] animate-in slide-in-from-bottom-4 duration-500">
<div class="bg-surface-container-lowest border border-surface-container-high rounded-xl p-8 login-card-shadow">
<h2 class="font-headline-md text-headline-md text-on-surface mb-8 text-center">
                Masuk Kasir
            </h2>
<form class="flex flex-col gap-6" onsubmit="return false">
<!-- Username Field -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">store</span>
                        Username Cabang
                    </label>
<div class="relative group">
<input class="w-full h-min-tap-target px-4 bg-surface-container-low border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200 outline-none font-body-md text-body-md text-on-surface" placeholder="contoh: corney-sepinggan" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">lock</span>
                        Password
                    </label>
<div class="relative group">
<input class="w-full h-min-tap-target pl-4 pr-12 bg-surface-container-low border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200 outline-none font-body-md text-body-md text-on-surface" id="passwordInput" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center h-10 w-10 rounded-full hover:bg-surface-container-high" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="eyeIcon">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-min-tap-target bg-primary-container text-on-primary font-headline-md text-headline-md rounded-xl primary-button-shadow active:scale-95 transition-all duration-150 mt-4 flex items-center justify-center gap-2">
                    Masuk
                </button>
<!-- Helper Text -->
<p class="text-center font-label-md text-label-md text-tertiary-container mt-2">
                    Hubungi Owner jika lupa password
                </p>
</form>
</div>
</main>
<!-- Footer -->
<footer class="mt-16 flex flex-col items-center gap-2 opacity-60">
<p class="font-label-md text-label-md text-tertiary-container">
            CORNEY Ops · Kasir
        </p>
<div class="flex gap-4">
<span class="text-[12px] font-label-md text-on-surface-variant">System ID: POS-IDX-7721</span>
<span class="text-[12px] font-label-md text-on-surface-variant">v2.4.0</span>
</div>
</footer>
<!-- Image for atmospheric context (hidden, but present for data-alt requirement) -->
<img class="hidden" data-alt="A modern and appetizing point-of-sale login screen interface for a vibrant fast-food brand called CORNEY. The aesthetic is clean and corporate yet energetic, featuring a bright white background with bold red and yellow accents. The UI is professional, with rounded cards, soft drop shadows, and high-quality iconography, designed specifically for a 10-inch landscape tablet. The mood is efficient, professional, and reflects the excitement of a busy Indonesian street food terminal." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBlElBvWhynE10IfDsHNuulZFGiDkGbZUdyIysmQ0OW8kM8RSgc123eAVRTzLXAjR5V9vTfj_XY5I29dwDGuUnpgcUgijH-CPAi79_ldCBJax1H3de78mYgfezCM8bnTkxqV08AI_7AHYCZsMotsM_DKIuIfwwS7Kxjk_K5P9PuTcJwujbxCNNb37iNmwCSjAPaYmRfvMfL4GlV0xPF6o1HPolflDhThjlk97Fsz6ynioLA_o7VPzxszuOXQN5-d0bRTnNoLyNomeg"/>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('passwordInput');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = 'visibility';
            }
        }

        // Simple ripple-like effect on button press
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', function() {
                this.classList.add('primary-button-active');
            });
            button.addEventListener('mouseup', function() {
                this.classList.remove('primary-button-active');
            });
            button.addEventListener('mouseleave', function() {
                this.classList.remove('primary-button-active');
            });
        });
    </script>
</body></html>
